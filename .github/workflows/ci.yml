name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Plain tests — no features, uses credentials.json (Database::new(None))
  # cfg(not(feature="full-stack"), not(feature="docker"), not(feature="database"))
  # ─────────────────────────────────────────────────────────────────────────────
  test-plain:
    name: Tests (no features / credentials.json)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-plain-${{ hashFiles('**/Cargo.lock') }}

      - name: Create credentials.json
        run: echo '{}' > credentials.json

      - name: Run tests (no features)
        run: cargo test --no-default-features

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: full-stack tests — kube + k8s-openapi + bollard + sqlx
  # Deploys deployment.yaml (rust-app + gameserver-postgres) into k3d
  # Uses registry on port 5001
  # ─────────────────────────────────────────────────────────────────────────────
  test-k3d-full-stack:
    name: Tests (full-stack feature / k3d)
    runs-on: ubuntu-latest

    env:
      SECRET: test
      SITE_URL: /gameserver-rs
      DOCKER_REPO: localhost:5001
      TESTING: "true"
      ENABLE_ADMIN_USER: "true"
      ADMIN_USER: testing
      ADMIN_PASSWORD: test
      POSTGRES_USER: gameserver
      POSTGRES_PASSWORD: gameserverpass
      POSTGRES_DB: gameserver_db
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-full-stack-${{ hashFiles('**/Cargo.lock') }}

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install psql client
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Fix Docker overlay2 and create k3d cluster with local registry (port 5001)
        run: |
          docker run --rm --privileged \
            -v /var/lib/docker:/var/lib/docker \
            alpine sh -c '
              count=0
              for dir in /var/lib/docker/overlay2/*/; do
                [ -d "$dir" ] || continue
                if [ ! -f "${dir}link" ]; then
                  echo "Removing broken overlay2 layer: $dir"
                  rm -rf "$dir"
                  count=$((count+1))
                fi
              done
              echo "Removed $count broken layers"
            '

          docker system prune -af --volumes || true

          for i in 1 2 3; do
            k3d registry delete localregistry-fullstack 2>/dev/null || true
            k3d cluster delete ci-full-stack 2>/dev/null || true
            if k3d registry create localregistry-fullstack --port 5001; then
              echo "Registry created on attempt $i"
              break
            fi
            echo "Attempt $i failed, pruning and retrying..."
            docker system prune -af --volumes || true
            sleep 10
            if [ $i -eq 3 ]; then
              echo "All registry creation attempts failed"
              exit 1
            fi
          done
          k3d cluster create ci-full-stack \
            --registry-use k3d-localregistry-fullstack:5001 \
            --wait \
            --timeout 120s

      - name: Build and push app image
        run: |
          echo '{}' > credentials.json
          docker build -f Dockerfile -t localhost:5001/rust-k8s:latest .
          docker run --rm localhost:5001/rust-k8s:latest test -x /app/gameserver && \
            echo "Binary verified at /app/gameserver" || \
            { echo "ERROR: binary missing from image"; docker run --rm localhost:5001/rust-k8s:latest find /app -type f; exit 1; }
          docker push localhost:5001/rust-k8s:latest

      - name: Apply deployment.yaml (patch registry, hostPaths and remove nodeSelector for CI)
        run: |
          mkdir -p /tmp/gameserver-rs /tmp/pg_data
          echo '' | base64 -d | python3 | kubectl apply -f -

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/rust-app --timeout=120s
          kubectl rollout status deployment/gameserver-postgres --timeout=120s

      - name: Debug - Check PostgreSQL pod status
        run: |
          echo "=== POSTGRESQL PODS ==="
          kubectl get pods -l app=gameserver-postgres
          echo ""
          echo "=== POSTGRESQL POD DETAILS ==="
          kubectl describe pod -l app=gameserver-postgres
          echo ""
          echo "=== POSTGRESQL LOGS ==="
          kubectl logs -l app=gameserver-postgres --tail=50
          echo ""
          echo "=== POSTGRESQL SERVICE ==="
          kubectl get svc gameserver-postgres -o yaml
          echo ""
          echo "=== ENDPOINTS ==="
          kubectl get endpoints gameserver-postgres
          echo ""

      - name: Debug - Check rust-app pod status
        run: |
          echo "=== RUST-APP PODS ==="
          kubectl get pods -l app=rust-app
          echo ""
          echo "=== RUST-APP POD DETAILS ==="
          kubectl describe pod -l app=rust-app
          echo ""
          echo "=== RUST-APP LOGS ==="
          kubectl logs -l app=rust-app --tail=50
          echo ""

      - name: Port-forward postgres and run setup_db.sh
        run: |
          echo "Waiting for gameserver-postgres deployment to be available..."
          kubectl wait --for=condition=available deployment/gameserver-postgres --timeout=60s

          echo "Waiting for gameserver-postgres pod to be ready..."
          kubectl wait --for=condition=ready pod -l app=gameserver-postgres --timeout=60s

          POSTGRES_POD=$(kubectl get pod -l app=gameserver-postgres -o jsonpath='{.items[0].metadata.name}')
          echo "PostgreSQL pod: $POSTGRES_POD"

          kubectl exec $POSTGRES_POD -- pg_isready -U gameserver || echo "WARNING: PostgreSQL not ready inside pod yet"

          echo "Starting port-forward to PostgreSQL..."
          kubectl port-forward svc/gameserver-postgres 5432:5432 --v=4 2>&1 &
          PF_PID=$!
          sleep 5

          if ! kill -0 $PF_PID 2>/dev/null; then
            echo "❌ Port-forward process died immediately"
            exit 1
          fi
          echo "✅ Port-forward process running with PID: $PF_PID"

          PG_READY=0
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U gameserver -d $POSTGRES_DB 2>&1; then
              echo "✅ PostgreSQL is ready on attempt $i!"
              PG_READY=1
              break
            fi
            if ! kill -0 $PF_PID 2>/dev/null; then
              echo "❌ Port-forward process died during waiting (attempt $i)"
              kubectl logs $POSTGRES_POD --tail=20
              exit 1
            fi
            echo "⏳ Waiting for PostgreSQL... ($i/30)"
            if [ $i -eq 5 ]; then
              kubectl get pod $POSTGRES_POD
              kubectl exec $POSTGRES_POD -- ps aux || true
            fi
            sleep 2
          done

          if [ $PG_READY -eq 0 ]; then
            echo "❌ PostgreSQL never became ready after 30 attempts"
            kubectl logs $POSTGRES_POD --tail=50
            kill $PF_PID 2>/dev/null || true
            exit 1
          fi

          echo "Running setup_db.sh..."
          bash setup_db.sh

          echo "Verifying database setup..."
          echo "SELECT 'setup_complete' as status;" | PGPASSWORD=$POSTGRES_PASSWORD psql -h localhost -p 5432 -U $POSTGRES_USER -d $POSTGRES_DB || echo "WARNING: Cannot query database after setup"

          kill $PF_PID 2>/dev/null || true
          wait $PF_PID 2>/dev/null || true

        env:
          PGPASSWORD: gameserverpass
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: gameserver
          PGDATABASE: gameserver_db

      - name: Run tests (full-stack feature)
        run: |
          kubectl wait --for=condition=ready pod -l app=gameserver-postgres --timeout=30s

          kubectl port-forward svc/gameserver-postgres 5432:5432 --v=4 &
          PF_PID=$!
          sleep 5

          if ! kill -0 $PF_PID 2>/dev/null; then
            echo "❌ Port-forward died before tests"
            exit 1
          fi

          if ! pg_isready -h localhost -p 5432 -U gameserver; then
            echo "❌ Cannot connect to PostgreSQL for tests"
            kill $PF_PID 2>/dev/null || true
            exit 1
          fi

          echo "Running cargo tests..."
          cargo test --features full-stack

          kill $PF_PID 2>/dev/null || true
        env:
          PGPASSWORD: gameserverpass
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== ALL PODS ==="
          kubectl get pods -A
          echo ""
          echo "=== EVENTS ==="
          kubectl get events --sort-by='.lastTimestamp' | tail -50
          echo ""
          echo "=== POSTGRESQL PODS ==="
          kubectl describe pod -l app=gameserver-postgres
          echo ""
          echo "=== POSTGRESQL LOGS ==="
          kubectl logs -l app=gameserver-postgres --tail=100
          echo ""
          echo "=== RUST-APP PODS ==="
          kubectl describe pod -l app=rust-app
          echo ""
          echo "=== RUST-APP LOGS ==="
          kubectl logs -l app=rust-app --tail=100
          echo ""
          echo "=== SERVICES ==="
          kubectl get svc -A
          echo ""
          echo "=== ENDPOINTS ==="
          kubectl get endpoints -A

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: k3d — inner gameserver deployment (child node / workspace member)
  # Runs AFTER job 2 to avoid parallel Docker daemon contention causing
  # overlay2 corruption: "open /var/lib/docker/overlay2/.../link: no such file"
  # Uses registry on port 5002
  # ─────────────────────────────────────────────────────────────────────────────
  test-k3d-gameserver:
    name: Tests (full-stack feature / k3d inner gameserver)
    runs-on: ubuntu-latest
    needs: test-k3d-full-stack

    env:
      SECRET: test
      SITE_URL: /gameserver-rs
      DOCKER_REPO: localhost:5002
      TESTING: "true"
      POSTGRES_USER: gameserver
      POSTGRES_PASSWORD: gameserverpass
      POSTGRES_DB: gameserver_db
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-k3d-gs-${{ hashFiles('**/Cargo.lock') }}

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Start PostgreSQL
        run: |
          docker run -d --name postgres \
            -e POSTGRES_USER=gameserver \
            -e POSTGRES_PASSWORD=gameserverpass \
            -e POSTGRES_DB=gameserver_db \
            -p 5432:5432 \
            postgres:15
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U gameserver && break
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          bash setup_db.sh
        env:
          PGPASSWORD: gameserverpass
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: gameserver
          PGDATABASE: gameserver_db

      - name: Fix Docker overlay2 and create k3d cluster with local registry (port 5002)
        run: |
          docker run --rm --privileged \
            -v /var/lib/docker:/var/lib/docker \
            alpine sh -c '
              count=0
              for dir in /var/lib/docker/overlay2/*/; do
                [ -d "$dir" ] || continue
                if [ ! -f "${dir}link" ]; then
                  echo "Removing broken overlay2 layer: $dir"
                  rm -rf "$dir"
                  count=$((count+1))
                fi
              done
              echo "Removed $count broken layers"
            '

          docker system prune -af --volumes || true

          for i in 1 2 3; do
            k3d registry delete localregistry-gameserver 2>/dev/null || true
            k3d cluster delete ci-gameserver 2>/dev/null || true
            if k3d registry create localregistry-gameserver --port 5002; then
              echo "Registry created on attempt $i"
              break
            fi
            echo "Attempt $i failed, pruning and retrying..."
            docker system prune -af --volumes || true
            sleep 10
            if [ $i -eq 3 ]; then
              echo "All registry creation attempts failed"
              exit 1
            fi
          done
          k3d cluster create ci-gameserver \
            --registry-use k3d-localregistry-gameserver:5002 \
            --wait \
            --timeout 120s

      - name: Build and push gameserver image
        run: |
          docker build -f gameserver/Dockerfile -t localhost:5002/gameserver:latest .

          echo "=== Verifying image configuration ==="
          IMAGE_CMD=$(docker inspect localhost:5002/gameserver:latest | jq -r '.[0].Config.Cmd | join(" ")')
          echo "CMD: $IMAGE_CMD"

          if [[ "$IMAGE_CMD" == *"cargo"* ]]; then
            echo "❌ ERROR: Built development image (contains cargo) instead of production image"
            exit 1
          fi
          echo "✅ Correct production image built"

          echo "=== Verifying binary ==="
          if docker run --rm localhost:5002/gameserver:latest test -x /app/gameserver-node; then
            echo "✅ Binary found at /app/gameserver-node"
          else
            echo "❌ Binary NOT found at /app/gameserver-node"
            docker run --rm localhost:5002/gameserver:latest ls -la /app/ 2>/dev/null || echo "No /app directory"
            docker run --rm localhost:5002/gameserver:latest find / -name "gameserver*" -type f 2>/dev/null || true
            exit 1
          fi

          echo "=== Pushing image to registry ==="
          docker push localhost:5002/gameserver:latest

          echo "=== Verifying image in registry ==="
          curl -s http://localhost:5002/v2/gameserver/tags/list

      - name: Deploy inner gameserver manifest
        run: |
          mkdir -p /tmp/gameserver-rs
          kubectl apply -f - <<'EOF'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: gameserver
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: gameserver
            template:
              metadata:
                labels:
                  app: gameserver
              spec:
                dnsPolicy: None
                dnsConfig:
                  nameservers:
                    - 8.8.8.8
                containers:
                  - name: gameserver
                    image: k3d-localregistry-gameserver:5002/gameserver:latest
                    imagePullPolicy: Always
                    ports:
                      - containerPort: 8080
                      - containerPort: 25565
                    volumeMounts:
                      - name: gameserver-storage
                        mountPath: /usr/src/app
                volumes:
                  - name: gameserver-storage
                    hostPath:
                      path: /tmp/gameserver-rs
                      type: DirectoryOrCreate
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: gameserver-service
          spec:
            selector:
              app: gameserver
            ports:
              - name: web
                protocol: TCP
                port: 8080
                targetPort: 8080
              - name: minecraft
                protocol: TCP
                port: 25565
                targetPort: 25565
            type: ClusterIP
          EOF

      - name: Wait for gameserver rollout
        run: kubectl rollout status deployment/gameserver --timeout=120s

      - name: Run tests (full-stack feature) with gameserver port-forwarded
        run: |
          kubectl port-forward svc/gameserver-service 8080:8080 &
          PF_PID=$!
          sleep 5
          cargo test --features full-stack
          kill $PF_PID || true

      - name: Dump logs on failure
        if: failure()
        run: |
          kubectl logs -l app=gameserver --tail=100 || true
          kubectl get pods -A || true
          kubectl get events --sort-by='.lastTimestamp' || true